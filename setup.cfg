[flake8]
max-line-length = 127
max-complexity = 10
exclude = 
    .git,
    __pycache__,
    venv/,
    .venv/,
    *.pyc
ignore = 
    E203,  # пробел перед двоеточием (конфликтует с black)
    W503   # перенос строки перед оператором

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
